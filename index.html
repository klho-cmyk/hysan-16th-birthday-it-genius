<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>🎂 Hysan · 平衡最美生日卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #FFF2E0, #FFD9B5);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 1000px;
            background: white;
            border-radius: 64px;
            padding: 2rem;
            box-shadow: 0 30px 45px rgba(0,0,0,0.1), 0 0 0 8px #FFE4B5;
        }

        h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #FF6B6B, #FFA559);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
        }

        .badge {
            text-align: center;
            margin: 0.8rem 0;
        }
        .badge span {
            background: #FFE2B5;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-weight: bold;
        }

        .message {
            background: #FFF4E8;
            border-radius: 2rem;
            padding: 1.2rem;
            line-height: 1.5;
            text-align: center;
        }

        .engine {
            background: #FEF5E9;
            border-left: 8px solid #FFA559;
            border-radius: 2rem;
            padding: 1rem;
            margin: 1.2rem 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .stat {
            background: #FFE0B5;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: bold;
        }

        .highlight {
            background: #FFDEB0;
            padding: 0.1rem 0.4rem;
            border-radius: 20px;
            font-weight: bold;
        }

        button {
            background: #FF9F4A;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 1rem;
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.8rem;
            color: #C2823A;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🎂 Hysan，16歲生日快樂 🎂</h1>
    <div class="badge"><span>✨ IT Genius · 開源冠軍 · 英語達人 ✨</span></div>

    <div class="message">
        💡 願你日日健康開心，所有努力都有美好回報。<br>
        ✨ 學英文單字就像 <strong class="highlight">Multi‑threaded Script</strong>：<br>
        <strong class="highlight">永久記憶、即時檢索、Zero Latency</strong> 🚀<br>
        🎯 比賽 <strong class="highlight">Perfect Deploy</strong>，全場最閃 Open Source 高手！
    </div>

    <div class="engine">
        <div>🧠 英文單字引擎</div>
        <div class="stats">
            <span class="stat">📖 詞彙吞吐 ∞</span>
            <span class="stat">⚡ 檢索 0ms</span>
            <span class="stat">💾 永久記憶</span>
        </div>
    </div>

    <div class="engine" style="border-left-color: #4ECDC4;">
        <div>🏆 冠軍成就</div>
        <div>🥇 香港程式王大賽 總冠軍 · 演算法滿分</div>
        <div>🎓 IELTS 8.0 · CEFR C2 精通級別</div>
    </div>

    <div style="text-align: center;">
        <button onclick="alert('🎊 Perfect Deploy！生日快樂 Hysan 🎊')">🎉 生日派對模式</button>
    </div>

    <div class="footer">
        ⭐ Hysan｜Open Source Hero｜繼續統治 IDE 與全世界 ⭐
    </div>
</div>
</body>
</html>
